---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-paas-limitrange-tekton
  annotations:
    policies.kyverno.io/title: Generate LimitRange for PaaS tekton tenants
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/subject: LimitRange
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      This policy will generate LimitRange resources for tekton Namespaces
      created by the PaaS operator.
spec:
  rules:
  - name: generate-limitrange-tekton
    match:
      any:
      - resources:
          kinds:
          - Namespace
          names:
          - "*-tekton"
          - "*tekton"
          selector:
            matchLabels:
              cpet.belastingdienst.nl/created-by: opr-paas
    generate:
      generateExisting: true
      apiVersion: v1
      kind: LimitRange
      name: default-limitrange-tekton
      synchronize: true
      namespace: "{{request.object.metadata.name}}"
      data:
        spec:
          limits:
          - type: Container
            default:
              memory: 5Gi
            defaultRequest:
              cpu: "1"
              memory: 2Gi