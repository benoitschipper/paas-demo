---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-paas-limitrange
  annotations:
    policies.kyverno.io/title: Generate LimitRange for PaaS tenants
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/subject: LimitRange
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      To better control the number of resources that can be created in a given
      Namespace and provide default resource consumption limits for Pods,
      ResourceQuota and LimitRange resources are recommended.
      This policy will generate LimitRange resources when a new Namespace is
      created by the PaaS operator.
spec:
  rules:
  - name: generate-limitrange
    match:
      any:
      - resources:
          kinds:
          - Namespace
          selector:
            matchLabels:
             cpet.belastingdienst.nl/created-by: opr-paas
    exclude:
      any:
      - resources:
          kinds:
          - Namespace
          names:
          - "*-tekton"
          - "*tekton"
    generate:
      generateExisting: true
      apiVersion: v1
      kind: LimitRange
      name: default-limitrange
      synchronize: true
      namespace: "{{request.object.metadata.name}}"
      data:
        spec:
          limits:
          - default:
              memory: 350Mi
            defaultRequest:
              cpu: 150m
              memory: 150Mi
            type: Container