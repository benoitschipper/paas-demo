---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kyverno

resources:
  - namespace.yaml

helmCharts:
  - name: kyverno
    releaseName: kyverno
    namespace: kyverno
    version: 3.6.2
    repo: https://kyverno.github.io/kyverno
    valuesMerge: replace
    valuesInline:
      admissionController:
        replicas: 3
      cleanupController:
        replicas: 2
      webhookLabels:
        app.kubernetes.io/managed-by: argocd
      backgroundController:
        replicas: 2
        resources:
          limits:
            memory: 256Mi
      config:
        resourceFiltersIncludeNamespaces: ["openshift-*"]
      crds:
        migration:
          securityContext:
            runAsUser: null
            runAsGroup: null
      reportsController:
        replicas: 2
        resources:
          limits:
            memory: 256Mi
      test:
        securityContext:
          runAsUser: null
          runAsGroup: null
      webhooksCleanup:
        securityContext:
          runAsUser: null
          runAsGroup: null

patches:
  # remove runAsUser/runAsGroup from the kyverno-migrate-resources job, as the removal in the helmChart above does not work.
  - target:
      kind: Job
      name: kyverno-migrate-resources
    patch: |
      - op: remove
        path: /spec/template/spec/containers/0/securityContext/runAsUser
      - op: remove
        path: /spec/template/spec/containers/0/securityContext/runAsGroup
