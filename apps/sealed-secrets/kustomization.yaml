---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sealed-secrets

resources:
  - upstream/v0.32.2/controller.yaml
  - cr_admin-sealedsecrets.yaml
  - namespace.yaml

patches:
  - target:
      kind: Deployment
      name: sealed-secrets-controller
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext
