---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: {{ .Values.paas }}-prometheus
spec:
  datasource:
    access: proxy
    editable: true
    secureJsonData:
      httpHeaderValue1: 'Bearer ${token}'
    name: prometheus
    url: 'https://thanos-querier.openshift-monitoring.svc.cluster.local:9091'
    uid: {{ .Values.paas }}-prometheus
    jsonData:
      httpHeaderName1: Authorization
      timeInterval: 5s
      tlsSkipVerify: true
    basicAuth: true
    isDefault: true
    type: prometheus
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          key: token
          name: grafana-serviceaccount-token
