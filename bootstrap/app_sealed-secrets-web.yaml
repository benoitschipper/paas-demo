---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-web
spec:
  destination:
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps/sealed-secrets-web
    repoURL: https://github.com/benoitschipper/paas-demo.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
