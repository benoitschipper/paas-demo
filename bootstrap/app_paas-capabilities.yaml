---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paas-capabilities
spec:
  destination:
    server: https://kubernetes.default.svc
  project: paas
  source:
    path: apps/paas-capabilities
    repoURL: https://github.com/benoitschipper/paas-demo.git
    targetRevision: main
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
    automated:
      prune: false
      selfHeal: true
  ignoreDifferences:
    - group: argoproj.io
      jsonPointers:
        - /spec/generators
      kind: ApplicationSet
