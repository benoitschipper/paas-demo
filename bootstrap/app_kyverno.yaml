---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/compare-options: 'ServerSideDiff=true,IncludeMutationWebhook=true'
  name: kyverno
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  project: default
  source:
    path: apps/kyverno
    repoURL: https://github.com/benoitschipper/paas-demo.git
    targetRevision: main
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      prune: false
      selfHeal: true
