---
# ============================================================
# DEMO 1 — Simple Paas
# ============================================================
# The absolute minimum to get a team environment up and running.
#
# What the operator will create:
#   • 1 namespace  : simple-app-dev
#   • 1 group      : simple-app-admins  (admin role)
#   • 1 capability : ArgoCD instance bootstrapped from Git
#   • Resource quota enforced on the namespace
# ============================================================
apiVersion: cpet.belastingdienst.nl/v1alpha2
kind: Paas
metadata:
  name: simple-app
spec:
  quota:
    limits.memory: 8Gi
    requests.cpu: "2"
    requests.memory: 4Gi
    requests.storage: 10Gi
  capabilities:
    argocd:
      custom_fields:
        git_url: "https://github.com/my-org/simple-app.git"
        git_revision: main
        git_path: argocd/bootstrap
  groups:
    admins:
      users:
        - alice@example.com
      roles:
        - admin
  namespaces:
    dev:
      groups:
        - admins
